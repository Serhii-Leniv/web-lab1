<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ресторан "Смак" - Лабораторна</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 2rem 0;
            text-align: center;
        }

        h1,
        h2 {
            margin-bottom: 1rem;
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            background: #fff;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f1f1f1;
            font-weight: 600;
        }

        .btn-toggle {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-toggle:hover {
            background-color: #2980b9;
        }

        .ingredients-row {
            display: none;
            background-color: #fafafa;
        }

        .ingredients-list {
            margin-left: 2rem;
            list-style-type: square;
            color: #555;
            padding: 0.5rem 0;
        }

        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            align-self: flex-start;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }

        #commentsList {
            list-style-type: none;
            margin-top: 1rem;
        }

        #commentsList li {
            background-color: #f9f9f9;
            border-left: 4px solid #3498db;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .comment-author {
            font-weight: bold;
            display: block;
            margin-bottom: 0.3rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Ресторан "Смак"</h1>
        <p>Найкращі страви з усього світу</p>
    </header>

    <main>
        <section id="menu-section">
            <h2>Наше Меню</h2>
            <p>Натисніть на кнопку "Інгредієнти", щоб дізнатися склад страви.</p>
            <table>
                <thead>
                    <tr>
                        <th>Назва страви</th>
                        <th>Ціна</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody id="menu-tbody"></tbody>
            </table>
        </section>

        <section id="about-section">
            <h2>Про нас</h2>
            <p style="margin-bottom: 1.5rem;">Ми - затишний ресторан, де готують з любов'ю. Залиште свій відгук про наш
                заклад!</p>

            <form id="feedback-form" class="feedback-form">
                <div class="form-group">
                    <label for="userName">Ваше ім'я:</label>
                    <input type="text" id="userName" name="userName" required placeholder="Введіть ваше ім'я">
                </div>
                <div class="form-group">
                    <label for="userComment">Ваш відгук:</label>
                    <textarea id="userComment" name="userComment" required
                        placeholder="Напишіть ваші враження..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Залишити відгук</button>
            </form>

            <div class="comments-container">
                <h3>Відгуки клієнтів:</h3>
                <ul id="commentsList"></ul>
            </div>
        </section>
    </main>

    <script>
        const menuItems = [
            {
                name: "Борщ український",
                price: "120 грн",
                ingredients: ["Буряк", "Капуста", "Картопля", "М'ясо", "Сметана", "Зелень"]
            },
            {
                name: "Піца Маргарита",
                price: "180 грн",
                ingredients: ["Тісто", "Томатний соус", "Сир Моцарелла", "Базилік"]
            },
            {
                name: "Салат Цезар",
                price: "150 грн",
                ingredients: ["Куряче філе", "Салат Айсберг", "Сир Пармезан", "Сухарики", "Соус Цезар"]
            },
            {
                name: "Паста Карбонара",
                price: "190 грн",
                ingredients: ["Спагетті", "Бекон", "Яйце", "Вершки", "Сир Пармезан"]
            }
        ];

        const menuTbody = document.getElementById('menu-tbody');

        for (let i = 0; i < menuItems.length; i++) {
            const item = menuItems[i];

            const trMain = document.createElement('tr');

            const tdName = document.createElement('td');
            tdName.textContent = item.name;

            const tdPrice = document.createElement('td');
            tdPrice.textContent = item.price;

            const tdAction = document.createElement('td');
            const btnToggle = document.createElement('button');
            btnToggle.textContent = 'Інгредієнти';
            btnToggle.className = 'btn-toggle';
            tdAction.appendChild(btnToggle);

            trMain.appendChild(tdName);
            trMain.appendChild(tdPrice);
            trMain.appendChild(tdAction);

            const trIngredients = document.createElement('tr');
            trIngredients.className = 'ingredients-row';

            const tdIngredients = document.createElement('td');
            tdIngredients.colSpan = 3;

            const ulIngredients = document.createElement('ul');
            ulIngredients.className = 'ingredients-list';

            item.ingredients.forEach(ingredient => {
                const li = document.createElement('li');
                li.textContent = ingredient;
                ulIngredients.appendChild(li);
            });

            tdIngredients.appendChild(ulIngredients);
            trIngredients.appendChild(tdIngredients);

            btnToggle.addEventListener('click', () => {
                if (trIngredients.style.display === 'table-row') {
                    trIngredients.style.display = 'none';
                    btnToggle.textContent = 'Інгредієнти';
                } else {
                    trIngredients.style.display = 'table-row';
                    btnToggle.textContent = 'Сховати';
                }
            });

            menuTbody.appendChild(trMain);
            menuTbody.appendChild(trIngredients);
        }

        const feedbackForm = document.getElementById('feedback-form');
        const commentsList = document.getElementById('commentsList');

        feedbackForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const nameInput = document.getElementById('userName');
            const commentInput = document.getElementById('userComment');

            const nameValue = nameInput.value.trim();
            const commentValue = commentInput.value.trim();

            if (nameValue !== '' && commentValue !== '') {
                const li = document.createElement('li');

                li.innerHTML = `
                    <span class="comment-author">${nameValue} каже:</span>
                    <span class="comment-text">${commentValue}</span>
                `;

                commentsList.appendChild(li);

                nameInput.value = '';
                commentInput.value = '';
            }
        });
    </script>
</body>

</html>
